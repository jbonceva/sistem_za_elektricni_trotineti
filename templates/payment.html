{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card p-5 shadow-sm">

        <h2 class="fw-bold mb-4">
            Payment Information
        </h2>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Card Holder</label>

                <input
                    type="text"
                    name="card_name"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">Card Number</label>

                <input
                    type="text"
                    name="card_number"
                    class="form-control"
                    required
                >
            </div>

            <div class="row">

                <div class="col-md-6">

                    <div class="mb-3">
                        <label class="form-label">
                            Expiry Date
                        </label>

                        <input
                            type="text"
                            name="expiry"
                            class="form-control"
                            placeholder="MM/YY"
                            required
                        >
                    </div>

                </div>

                <div class="col-md-6">

                    <div class="mb-3">
                        <label class="form-label">
                            CVV
                        </label>

                        <input
                            type="password"
                            name="cvv"
                            class="form-control"
                            required
                        >
                    </div>

                </div>

            </div>

            <button class="btn btn-dark w-100">
                Pay & Start Ride
            </button>

        </form>

    </div>

</div>

{% endblock %}
