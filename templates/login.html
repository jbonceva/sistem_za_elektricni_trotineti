{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card p-5 shadow-sm">

            <h1 class="mb-4 fw-bold text-center">
                Login
            </h1>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        required
                    >

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required
                    >

                </div>

                <button
                    type="submit"
                    class="btn btn-success w-100"
                >
                    Login
                </button>

            </form>

            <a
                href="/register/"
                class="btn btn-outline-success mt-3"
            >
                Create New Account
            </a>

        </div>

    </div>

</div>

{% endblock %}
